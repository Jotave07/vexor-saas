services:
  vexor-saas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vexor-saas
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST
      - DB_PORT
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - API_PORT
      - APP_DOMAIN
      - VITE_APP_DOMAIN
      - FRONTEND_URL
      - API_PUBLIC_URL
      - JWT_SECRET
      - APP_ENCRYPTION_KEY
      - MASTER_EMAIL
      - MASTER_PASSWORD
