services:
  vexor-saas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vexor-saas
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST
      - DB_PORT
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - API_PORT
      - APP_DOMAIN
      - VITE_APP_DOMAIN
      - FRONTEND_URL
      - API_PUBLIC_URL
      - JWT_SECRET
      - APP_ENCRYPTION_KEY
      - MASTER_EMAIL
      - MASTER_PASSWORD
    labels:
      - traefik.enable=true
      - traefik.http.routers.vexor-main.rule=Host(`vexortech.cloud`) || Host(`nexshop.vexortech.cloud`)
      - traefik.http.routers.vexor-main.entrypoints=websecure
      - traefik.http.routers.vexor-main.tls.certresolver=letsencrypt
      - traefik.http.routers.vexor-main.priority=100
      - traefik.http.routers.vexor-tenant.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.vexortech.cloud`)
      - traefik.http.routers.vexor-tenant.ruleSyntax=v2
      - traefik.http.routers.vexor-tenant.entrypoints=websecure
      - traefik.http.routers.vexor-tenant.tls.certresolver=letsencrypt
      - traefik.http.routers.vexor-tenant.priority=10
      - traefik.http.services.vexor-saas.loadbalancer.server.port=3001
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
